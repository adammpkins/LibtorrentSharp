name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        run: dotnet build LibtorrentSharp/LibtorrentSharp.csproj -c Release

      - name: Test (non-network)
        run: dotnet test LibtorrentSharp.Tests/LibtorrentSharp.Tests.csproj --filter "Category!=Network&Category!=Native" -c Release --logger "console;verbosity=normal"
